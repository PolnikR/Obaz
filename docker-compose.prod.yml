services:
  web:
    image: ${APP_IMAGE:-erik-project:local}
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app_data:/app/data
      - app_media:/app/media
      - app_static:/app/staticfiles

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - app_media:/app/media:ro
      - app_static:/app/staticfiles:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app_data:
  app_media:
  app_static:
