services:
  web:
    image: ${APP_IMAGE:-erik-project:local}
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-8110}:8000"
    volumes:
      - app_data:/app/data
      - app_media:/app/media
      - app_static:/app/staticfiles

volumes:
  app_data:
  app_media:
  app_static:
