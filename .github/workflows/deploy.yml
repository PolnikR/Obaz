name: Build And Deploy

on:
  push:
    branches:
      - master
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: obaz-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'master' && 'production' || 'staging') }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'master' && 'production' || 'staging') }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize GHCR owner
        shell: bash
        run: echo "GHCR_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GHCR_OWNER_LC }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.GHCR_OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Check deploy configuration
        id: deploy_config
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY_PRESENT: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY != '' }}
          APP_ENV_FILE_PRESENT: ${{ secrets.APP_ENV_FILE != '' }}
        run: |
          if [ -n "$DEPLOY_HOST" ] \
            && [ -n "$DEPLOY_USER" ] \
            && [ "$DEPLOY_KEY_PRESENT" = "true" ] \
            && [ "$APP_ENV_FILE_PRESENT" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped. Fill DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_PRIVATE_KEY and APP_ENV_FILE secrets."
          fi

      - name: Prepare SSH key
        if: steps.deploy_config.outputs.enabled == 'true'
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose files
        if: steps.deploy_config.outputs.enabled == 'true'
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p /opt/projects/obaz/deploy"
          scp -i ~/.ssh/id_ed25519 docker-compose.prod.yml "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/projects/obaz/docker-compose.prod.yml"
          scp -i ~/.ssh/id_ed25519 deploy/nginx.conf "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/projects/obaz/deploy/nginx.conf"

      - name: Write runtime env file
        if: steps.deploy_config.outputs.enabled == 'true'
        shell: bash
        run: |
          {
            echo "APP_IMAGE=ghcr.io/${{ env.GHCR_OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            printf '%s\n' "${{ secrets.APP_ENV_FILE }}"
          } | ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "cat > /opt/projects/obaz/.env"

      - name: Deploy on server
        if: steps.deploy_config.outputs.enabled == 'true'
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            set -eu
            cd /opt/projects/obaz
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
          "

      - name: Health check
        if: steps.deploy_config.outputs.enabled == 'true'
        shell: bash
        run: |
          sleep 20
          curl --fail --retry 5 --retry-delay 5 "${{ secrets.HEALTHCHECK_URL }}"
